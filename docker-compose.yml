services:
  postgres:
    image: postgres:16-alpine
    container_name: rolex-cart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rolex
      POSTGRES_PASSWORD: rolex_password
      POSTGRES_DB: rolex_cart
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
